<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulp Cthulhu - Mapa Kampanii</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap"
    rel="stylesheet">
</head>
<body>
    <div id="search-container">

        <input
            id="search"
            type="text"
            placeholder="Szukaj..."
        >

        <div id="search-results"></div>

    </div>
    <div id="map"></div>

    <div id="session-panel" class="hidden">

        <div id="session-header">
            Wybierz lokalizację
        </div>

        <div id="session-content">
            Kliknij pinezkę na mapie.
        </div>

    </div>

    <div id="coords">
        X: 0.0000<br>
        Y: 0.0000
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
